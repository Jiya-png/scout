

services:
  postgres:
    image: postgres:16

    container_name: scout-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: scout
      POSTGRES_PASSWORD: scout123
      POSTGRES_DB: scoutdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: